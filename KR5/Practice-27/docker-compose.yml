services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-kr5
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build: ./producer
    container_name: kr5-producer
    ports:
      - "3001:3001"
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      PORT: 3001
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker1:
    build: ./consumer
    container_name: kr5-worker1
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      WORKER_ID: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker2:
    build: ./consumer
    container_name: kr5-worker2
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      WORKER_ID: "2"
    depends_on:
      rabbitmq:
        condition: service_healthy
