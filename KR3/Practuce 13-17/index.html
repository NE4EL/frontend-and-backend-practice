<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4285f4">

    <link rel="apple-touch-icon" href="/icons/favicon-128x128.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Заметки (13-17)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="icon" href="icons/favicon.ico" type="image/x-icon">

    <style>
        body { padding: 1rem; }
        header { margin-bottom: 1rem; }
        header h1 { margin-bottom: 0.5rem; font-size: 1.6rem; }
        .tab.active { background: #4285f4; color: #fff; }
        #sw-status { font-size: 0.8rem; color: #888; text-align: center; margin-top: 0.25rem; }
        footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <header>
        <h1>Заметки — офлайн PWA</h1>
        <nav class="tabs is-center">
            <button id="home-btn" class="tab active col-6">Главная</button>
            <button id="about-btn" class="tab col-6">О приложении</button>
        </nav>
        <p id="sw-status">Service Worker: загрузка...</p>
    </header>

    <main id="app-content" class="container">
    </main>

    <footer class="is-center">
        <button id="enable-push" class="button success">Включить уведомления</button>
        <button id="disable-push" class="button error" style="display:none;">Отключить уведомления</button>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
