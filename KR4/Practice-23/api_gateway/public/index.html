<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Practice 23</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage" class="authPage">
  <div class="authCard">
    <div class="authCard__logo">
      <span class="logo__icon">⚡</span>
      <span class="logo__text">TechStore</span>
    </div>
    <p class="authCard__sub">Practice 23 — Microservices</p>

    <div class="tabs">
      <button class="tab tab--active" id="tabLogin" onclick="switchTab('login')">Вход</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- Login form -->
    <form id="loginForm" class="authForm" onsubmit="doLogin(event)">
      <label class="field">
        <span>Email</span>
        <input type="email" id="loginEmail" placeholder="admin@test.com" required />
      </label>
      <label class="field">
        <span>Пароль</span>
        <input type="password" id="loginPassword" placeholder="pass123" required />
      </label>
      <div id="loginError" class="error hidden"></div>
      <button type="submit" class="btn btn--primary btn--full">Войти</button>
    </form>

    <!-- Register form -->
    <form id="registerForm" class="authForm hidden" onsubmit="doRegister(event)">
      <label class="field">
        <span>Имя</span>
        <input type="text" id="regFirstName" placeholder="Иван" required />
      </label>
      <label class="field">
        <span>Фамилия</span>
        <input type="text" id="regLastName" placeholder="Петров" required />
      </label>
      <label class="field">
        <span>Email</span>
        <input type="email" id="regEmail" placeholder="user@test.com" required />
      </label>
      <label class="field">
        <span>Пароль</span>
        <input type="password" id="regPassword" placeholder="pass123" required />
      </label>
      <label class="field">
        <span>Роль</span>
        <select id="regRole">
          <option value="user">user</option>
          <option value="seller">seller</option>
          <option value="admin">admin</option>
        </select>
      </label>
      <div id="registerError" class="error hidden"></div>
      <button type="submit" class="btn btn--primary btn--full">Зарегистрироваться</button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="appPage" class="appPage hidden">
  <header class="header">
    <div class="header__brand">
      <span class="logo__icon">⚡</span>
      <span class="logo__text">TechStore</span>
      <span class="header__badge">Microservices</span>
    </div>
    <nav class="header__nav">
      <button class="navBtn navBtn--active" id="navProducts" onclick="showSection('products')">Товары</button>
      <button class="navBtn hidden" id="navUsers" onclick="showSection('users')">Пользователи</button>
      <button class="navBtn" id="navStatus" onclick="showSection('status')">Статус</button>
    </nav>
    <div class="header__user">
      <span id="userInfo" class="userBadge"></span>
      <button class="btn btn--ghost" onclick="doLogout()">Выйти</button>
    </div>
  </header>

  <!-- PRODUCTS SECTION -->
  <section id="sectionProducts" class="section">
    <div class="section__head">
      <h2 class="section__title">Товары</h2>
      <button class="btn btn--primary" id="btnAddProduct" onclick="openProductModal()" style="display:none">+ Добавить</button>
    </div>
    <div id="productsList" class="cards"></div>
  </section>

  <!-- USERS SECTION -->
  <section id="sectionUsers" class="section hidden">
    <div class="section__head">
      <h2 class="section__title">Пользователи</h2>
    </div>
    <div class="tableWrap">
      <table class="table" id="usersTable">
        <thead>
          <tr>
            <th>ID</th><th>Email</th><th>Роль</th><th>Статус</th><th>Действия</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </section>

  <!-- STATUS SECTION -->
  <section id="sectionStatus" class="section hidden">
    <div class="section__head">
      <h2 class="section__title">Состояние Gateway</h2>
      <button class="btn btn--ghost" onclick="loadStatus()">Обновить</button>
    </div>
    <div id="statusCards" class="cards"></div>
  </section>
</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal hidden">
  <div class="modal__overlay" onclick="closeProductModal()"></div>
  <div class="modal__box">
    <h3 class="modal__title" id="modalTitle">Товар</h3>
    <form onsubmit="submitProduct(event)">
      <input type="hidden" id="productId" />
      <label class="field">
        <span>Название</span>
        <input type="text" id="pTitle" required />
      </label>
      <label class="field">
        <span>Категория</span>
        <input type="text" id="pCategory" required />
      </label>
      <label class="field">
        <span>Описание</span>
        <input type="text" id="pDescription" required />
      </label>
      <label class="field">
        <span>Цена (₽)</span>
        <input type="number" id="pPrice" required />
      </label>
      <div id="productError" class="error hidden"></div>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" onclick="closeProductModal()">Отмена</button>
        <button type="submit" class="btn btn--primary" id="modalSubmitBtn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
